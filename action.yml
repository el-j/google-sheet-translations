name: 'Fetch Google Sheet Translations'
description: >-
  Fetch translations from Google Sheets and write locale JSON files, locales.ts index, and languageData.json snapshot.

branding:
  icon: 'globe'
  color: 'green'

inputs:
  google-client-email:
    description: 'Google service-account client e-mail (GOOGLE_CLIENT_EMAIL)'
    required: true
  google-private-key:
    description: 'Google service-account private key (GOOGLE_PRIVATE_KEY)'
    required: true
  google-spreadsheet-id:
    description: 'ID of the Google Spreadsheet (GOOGLE_SPREADSHEET_ID). If omitted and auto-create is true, a new spreadsheet is created automatically.'
    required: false
    default: ''
  sheet-titles:
    description: >
      Comma-separated list of sheet tab names to process
      (e.g. "landingPage,about"). The "i18n" sheet is always included
      automatically.
    required: true
  row-limit:
    description: 'Maximum number of rows to read per sheet'
    required: false
    default: '100'
  wait-seconds:
    description: 'Base back-off delay in seconds for retrying rate-limited API calls (HTTP 429/503)'
    required: false
    default: '1'
  translations-output-dir:
    description: 'Directory to write per-locale JSON translation files'
    required: false
    default: 'translations'
  locales-output-path:
    description: 'File path for the generated locales.ts index'
    required: false
    default: 'src/i18n/locales.ts'
  data-json-path:
    description: 'File path for the languageData.json snapshot'
    required: false
    default: 'src/lib/languageData.json'
  sync-local-changes:
    description: >
      Push local changes from languageData.json back to the spreadsheet
      before fetching. Set to "false" to disable.
    required: false
    default: 'true'
  auto-translate:
    description: >
      Automatically add GOOGLETRANSLATE formulas for missing locale columns
      when new keys are pushed to the spreadsheet. Set to "true" to enable.
    required: false
    default: 'false'
  override:
    description: >
      When "true" and auto-translate is also "true", existing translations in
      other language columns are overwritten with GOOGLETRANSLATE formulas
      whenever a key is pushed.  When "false" (the default) only empty cells
      receive a formula – existing translations are preserved.
    required: false
    default: 'false'
  auto-create:
    description: >
      Automatically create a new Google Spreadsheet when no spreadsheet ID is
      provided. Requires google-client-email and google-private-key.
    required: false
    default: 'true'
  spreadsheet-title:
    description: 'Title for the auto-created spreadsheet'
    required: false
    default: 'google-sheet-translations'
  source-locale:
    description: 'Source locale for GOOGLETRANSLATE formulas in the auto-created spreadsheet'
    required: false
    default: 'en'
  target-locales:
    description: 'Comma-separated target locales for auto-translation (e.g. "de,fr,es")'
    required: false
    default: 'de,fr,es,it,pt,ja,zh'
  node-version:
    description: 'DEPRECATED – no longer used. The action always runs on Node 20.'
    required: false
    default: '20'
  package-version:
    description: 'DEPRECATED – no longer used. The bundled package version is fixed at release time.'
    required: false
    default: 'latest'

outputs:
  translations-dir:
    description: 'Absolute path of the directory containing locale JSON files'
  locales-file:
    description: 'Absolute path of the generated locales.ts file'
  data-json-file:
    description: 'Absolute path of the languageData.json snapshot'

runs:
  using: 'node20'
  main: 'dist-action/index.mjs'
