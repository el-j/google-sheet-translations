name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:

# Sets permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package (required by sync script and VitePress data loader)
        run: npm run build

      - name: Check sync credentials
        id: sync_creds
        env:
          _MAIL: ${{ secrets.mail }}
        run: |
          if [ -n "$_MAIL" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "[sync] No credentials found – skipping translation sync (secrets 'mail' / 'private-key' / 'docId' not set)"
          fi

      - name: Sync translations to demo spreadsheet
        if: steps.sync_creds.outputs.has_creds == 'true'
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.mail }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.private-key }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.docId }}
        run: node scripts/sync-demo-translations.mjs

      - name: Verify translations were pushed
        if: steps.sync_creds.outputs.has_creds == 'true'
        env:
          GOOGLE_SPREADSHEET_ID: ${{ secrets.docId }}
        run: node scripts/verify-demo-translations.mjs

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
