name: Deploy Documentation

on:
  # Primary trigger on main: run AFTER the Release workflow finishes so the
  # checked-out package.json already contains the version bump committed by
  # semantic-release.  The semantic-release commit carries "[skip ci]" which
  # suppresses the push trigger — workflow_run is the only way to catch it.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

  # Secondary trigger: website / script changes that are not part of a release
  # (e.g. fixing a typo in a doc page). src/** and tests/** are intentionally
  # omitted here — those changes go through the Release workflow first.
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'scripts/**'
      - '.github/workflows/docs.yml'
      - 'README.md'

  workflow_dispatch:

# Sets permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    environment: production
    # When triggered by workflow_run, only proceed if the Release workflow
    # succeeded.  For push / workflow_dispatch we always build.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # When triggered by workflow_run, check out main HEAD so we get the
          # version-bumped package.json committed by semantic-release.
          # For push / workflow_dispatch, use the SHA that triggered this run.
          ref: ${{ github.event_name == 'workflow_run' && 'main' || github.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package (required by sync script and VitePress data loader)
        run: npm run build

      - name: Check sync credentials
        id: sync_creds
        env:
          _MAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
        run: |
          if [ -n "$_MAIL" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
            echo "[sync] No credentials found – skipping translation sync (secrets 'GOOGLE_CLIENT_EMAIL' / 'GOOGLE_PRIVATE_KEY' / 'GOOGLE_SPREADSHEET_ID' not set)"
          fi

      - name: Sync translations to demo spreadsheet
        if: steps.sync_creds.outputs.has_creds == 'true'
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: node scripts/sync-demo-translations.mjs

      - name: Verify translations were pushed
        if: steps.sync_creds.outputs.has_creds == 'true'
        env:
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: node scripts/verify-demo-translations.mjs

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
