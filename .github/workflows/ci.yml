name: CI

on:
  push:
    branches: [main, develop, next]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [20, 22, 24]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Integration test (public spreadsheet connectivity)
        if: matrix.node-version == '22'
        run: node -e "
          const { getSpreadSheetData } = require('./dist/index.js');
          getSpreadSheetData(['landingPage'], {
            spreadsheetId: '1QPT1wGSN5knfmXDlN1UKYr3nVUYl4-wDGipaPNurwC0',
            publicSheet: true,
            syncLocalChanges: false,
            translationsOutputDir: '/tmp/ci-translations',
            localesOutputPath: '/tmp/ci-translations/locales.ts',
            dataJsonPath: '/tmp/ci-translations/languageData.json',
          }).then(t => {
            const locales = Object.keys(t);
            if (locales.length === 0) { console.error('FAIL: no locales returned'); process.exit(1); }
            console.log('PASS: got', locales.length, 'locale(s):', locales.join(', '));
          }).catch(e => { console.error('FAIL:', e.message); process.exit(1); });
        "

      - name: Upload coverage
        if: matrix.node-version == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
