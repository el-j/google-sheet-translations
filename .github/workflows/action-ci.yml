name: Action CI

on:
  push:
    branches: [main, develop, next]
    paths:
      - action.yml
      - src/action-entrypoint.ts
      - dist-action/**
  pull_request:
    branches: [main, develop]
    paths:
      - action.yml
      - src/action-entrypoint.ts
      - dist-action/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-action-bundle:
    name: Validate action bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build action bundle
        run: npm run build:action

      - name: Check action bundle is up-to-date
        run: |
          if ! git diff --exit-code dist-action/; then
            echo "::error::dist-action/ is out of date. Run 'npm run build:action' locally and commit the result."
            exit 1
          fi

      - name: Run action entrypoint unit tests
        run: npx jest tests/action-entrypoint.test.ts --no-coverage
